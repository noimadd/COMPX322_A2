<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>COMPX322 - Assignment Two</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    </head>
    <body>
        <section id="controls" class="controls">
            <button id="add-widget-btn" class="btn-add" aria-label="add population widget">
                <svg 
                    xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" 
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-diamond-plus-icon lucide-diamond-plus">
                    <path d="M12 8v8"/>
                    <path d="M2.7 10.3a2.41 2.41 0 0 0 0 3.41l7.59 7.59a2.41 2.41 0 0 0 3.41 0l7.59-7.59a2.41 2.41 0 0 0 0-3.41L13.7 2.71a2.41 2.41 0 0 0-3.41 0z"/>
                    <path d="M8 12h8"/>
                </svg>
                <span>Add Widget</span>
            </button>
        </section>

        <main>
            <section id="dashboard" class="dashboard" aria-label="population dashboard">
                <div class="widget">
                    <div class="widget-header">
                        <h3 class="widget-title">No Data Selected</h3>
                        <button class="widget-close-btn" aria-label="close widget">
                            ✕
                        </button>
                    </div>
                    <div class="widget-controls">
                        <div class="data-select widget-control">
                            <label class="control-label" for="data-select">DATA</label>
                            <select name="data-select" id="data-select"></select>
                        </div>
                        <div class="country-select widget-control">
                            <label class="control-label" for="country-select">COUNTRY</label>
                            <select name="country-select" id="country-select"></select>
                        </div>
                        <div class="chart-select widget-control">
                            <label class="control-label" for="chart-select">CHART TYPE</label>
                            <select name="chart-select" id="chart-select"></select>
                        </div>
                    </div>
                    <div class="widget-content">
                        <canvas class="widget-chart" aria-label="population data chart"></canvas>
                    </div>
                </div>
            </section>
        </main>

        <script src="main.js"></script>
        <script src="widgetClass.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    </body>
</html>
